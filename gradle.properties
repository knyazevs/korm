kotlin.code.style=official
version = 0.4.0
group = io.github.kormium

# The `samples` modules still use a custom-named native target (e.g. macosX64("native"))
# so a single nativeMain source set works across whichever host target is active. That
# name clashes with the Default Hierarchy Template's generated source sets, so the template
# is disabled globally. The published library modules declare real, multiple native targets
# and call applyDefaultHierarchyTemplate() explicitly (no clash — real target names).
kotlin.mpp.applyDefaultHierarchyTemplate=false

# Share libpq / sqlite3 cinterop declarations from the common nativeMain source set across
# the real native targets (linuxX64/macosX64/macosArm64). Without this the cinterop packages
# are only visible from each leaf target's source set, not from nativeMain.
kotlin.mpp.enableCInteropCommonization=true

# Android Gradle plugin: the mobile targets (androidTarget) pull in AndroidX artifacts
# (androidx.sqlite for the SQLite driver), which AGP only resolves with this flag on.
android.useAndroidX=true

# Use the Dokka Gradle plugin V2 (V1 is deprecated, removed in Dokka 2.1.0).
org.jetbrains.dokka.experimental.gradle.pluginMode=V2Enabled
org.jetbrains.dokka.experimental.gradle.pluginMode.noWarn=true

# Publishing secrets (do NOT commit real values). Provide locally via ~/.gradle/gradle.properties
# or local.properties, or in CI via ORG_GRADLE_PROJECT_* env vars. Used by the vanniktech plugin:
#   mavenCentralUsername / mavenCentralPassword   — Central Portal user token (central.sonatype.com)
#   signingInMemoryKey / signingInMemoryKeyPassword — ASCII-armored GPG private key + its password
