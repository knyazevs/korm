# Postgres (the source of truth) for the sqlite-cache sample. Start it before running:
#   docker compose -f samples/sqlite-cache/docker-compose.yml up -d
# These settings match the ones hardcoded in the sample
# (localhost:5432, user/db "postgres", password "password"). The SQLite cache is in-memory.
services:
  postgres:
    image: postgres:16-alpine
    container_name: korm-sqlite-cache-postgres
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 20
