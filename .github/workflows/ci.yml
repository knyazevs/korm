name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest # Linux x86_64 is a supported Kotlin/Native host

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install libpq + libsqlite3 (for the Kotlin/Native cinterops)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libsqlite3-dev

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # JVM unit tests. kormium-sqlite runs against an in-memory database (no Docker); it covers
      # both the blocking and the suspend (offload) paths.
      - name: JVM tests
        run: ./gradlew :kormium-core:jvmTest :kormium-sqlite:jvmTest :kormium-migrate:jvmTest --console=plain

      # Native (libpq) tests against the Postgres service above. The host native test task
      # on a Linux runner is linuxX64Test (the modules now declare real native targets).
      # kormium-sqlite's native tests use an in-memory database (no Postgres needed).
      - name: Native tests
        env:
          KORMIUM_DB_HOST: localhost
          KORMIUM_DB_PORT: "5432"
          KORMIUM_DB_NAME: postgres
          KORMIUM_DB_USER: postgres
          KORMIUM_DB_PASSWORD: password
        run: ./gradlew :kormium-core:linuxX64Test :kormium-postgres:linuxX64Test :kormium-sqlite:linuxX64Test :kormium-migrate:linuxX64Test --console=plain

      # The ktor integration libraries are libraries (no native exe link), so assemble
      # builds their JVM + native artifacts to verify they compile on every target.
      - name: Build ktor integration modules
        run: ./gradlew :kormium-ktor:assemble :kormium-ktor-di:assemble :kormium-ktor-koin:assemble --console=plain

      # Cross-compile the experimental Windows (mingwX64) klibs. There is no Windows
      # runner yet, so nothing executes — this only keeps the target compiling. The libpq
      # cinterop resolves platform-neutral headers from libpq-dev installed above.
      - name: Cross-compile Windows (mingwX64) klibs
        run: ./gradlew :kormium-core:compileKotlinMingwX64 :kormium-postgres:compileTestKotlinMingwX64 :kormium-sqlite:linkDebugTestMingwX64 :kormium-observe:compileKotlinMingwX64 :kormium-migrate:compileKotlinMingwX64 :kormium-ktor:compileKotlinMingwX64 :kormium-ktor-di:compileKotlinMingwX64 :kormium-ktor-koin:compileKotlinMingwX64 --console=plain

      # Self-contained SQLite samples — tests run on both JVM and native (no Docker needed).
      # The samples still use a single host-named native target, so their task is `nativeTest`.
      - name: SQLite sample tests (JVM + native)
        run: >-
          ./gradlew
          :samples:crud-sqlite:jvmTest :samples:crud-sqlite:nativeTest
          :samples:repository:jvmTest :samples:repository:nativeTest
          :samples:sharding:jvmTest :samples:sharding:nativeTest
          --console=plain

      # Async r2dbc backend (JVM-only) — end-to-end tests spin up their own Postgres via
      # Testcontainers.
      - name: r2dbc tests (Testcontainers, JVM)
        run: ./gradlew :kormium-r2dbc:jvmTest --console=plain

      # Postgres samples — JVM end-to-end tests spin up their own Postgres via Testcontainers.
      # samples:r2dbc is the async variant of ktor-di.
      - name: Postgres sample tests (Testcontainers, JVM)
        run: >-
          ./gradlew
          :samples:ktor-di:jvmTest :samples:ktor-koin:jvmTest :samples:sqlite-cache:jvmTest
          :samples:r2dbc:jvmTest
          --console=plain

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/**"
          if-no-files-found: ignore

  # Compose Multiplatform targets (androidTarget + iosX64/iosArm64/iosSimulatorArm64).
  # iOS klibs only compile on a macOS host; the macos-latest runner also ships the Android
  # SDK, so it covers both. The unqualified task names run in every module that declares
  # them — i.e. kormium-core, kormium-sqlite and the three kormium-ktor* modules.
  mobile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Compile the Android and iOS variants of every Compose-Multiplatform-enabled module.
      # sqlite3.h is vendored and iOS/macOS ship libsqlite3, so no extra system deps are needed.
      - name: Build Android + iOS targets
        run: >-
          ./gradlew
          compileAndroidMain
          compileKotlinIosArm64 compileKotlinIosX64 compileKotlinIosSimulatorArm64
          --console=plain

# Publishing to Maven Central lives in its own manual-dispatch workflow (.github/workflows/publish.yml)
# so a release is a deliberate, maintainer-triggered action rather than a side effect of CI.
