name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest # Linux x86_64 is a supported Kotlin/Native host

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install libpq + libsqlite3 (for the Kotlin/Native cinterops)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libsqlite3-dev

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # JVM unit tests. korm-sqlite runs against an in-memory database (no Docker); it covers
      # both the blocking and the suspend (offload) paths.
      - name: JVM tests
        run: ./gradlew :korm-core:jvmTest :korm-sqlite:jvmTest --console=plain

      # Native (libpq) tests against the Postgres service above. The host native test task
      # on a Linux runner is linuxX64Test (the modules now declare real native targets).
      # korm-sqlite's native tests use an in-memory database (no Postgres needed).
      - name: Native tests
        env:
          KORM_DB_HOST: localhost
          KORM_DB_PORT: "5432"
          KORM_DB_NAME: postgres
          KORM_DB_USER: postgres
          KORM_DB_PASSWORD: password
        run: ./gradlew :korm-core:linuxX64Test :korm-postgres:linuxX64Test :korm-sqlite:linuxX64Test --console=plain

      # The ktor integration libraries are libraries (no native exe link), so assemble
      # builds their JVM + native artifacts to verify they compile on every target.
      - name: Build ktor integration modules
        run: ./gradlew :korm-ktor:assemble :korm-ktor-di:assemble :korm-ktor-koin:assemble --console=plain

      # Self-contained SQLite samples — tests run on both JVM and native (no Docker needed).
      # The samples still use a single host-named native target, so their task is `nativeTest`.
      - name: SQLite sample tests (JVM + native)
        run: >-
          ./gradlew
          :samples:crud-sqlite:jvmTest :samples:crud-sqlite:nativeTest
          :samples:sharding:jvmTest :samples:sharding:nativeTest
          --console=plain

      # Async r2dbc backend (JVM-only) — end-to-end tests spin up their own Postgres via
      # Testcontainers.
      - name: r2dbc tests (Testcontainers, JVM)
        run: ./gradlew :korm-r2dbc:jvmTest --console=plain

      # Postgres samples — JVM end-to-end tests spin up their own Postgres via Testcontainers.
      # samples:r2dbc is the async variant of ktor-di.
      - name: Postgres sample tests (Testcontainers, JVM)
        run: >-
          ./gradlew
          :samples:ktor-di:jvmTest :samples:ktor-koin:jvmTest :samples:sqlite-cache:jvmTest
          :samples:r2dbc:jvmTest
          --console=plain

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/**"
          if-no-files-found: ignore

  # Compose Multiplatform targets (androidTarget + iosX64/iosArm64/iosSimulatorArm64).
  # iOS klibs only compile on a macOS host; the macos-latest runner also ships the Android
  # SDK, so it covers both. The unqualified task names run in every module that declares
  # them — i.e. korm-core, korm-sqlite and the three korm-ktor* modules.
  mobile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Compile the Android and iOS variants of every Compose-Multiplatform-enabled module.
      # sqlite3.h is vendored and iOS/macOS ship libsqlite3, so no extra system deps are needed.
      - name: Build Android + iOS targets
        run: >-
          ./gradlew
          compileAndroidMain
          compileKotlinIosArm64 compileKotlinIosX64 compileKotlinIosSimulatorArm64
          --console=plain

  # Publish all artifacts (JVM + linuxX64/macosX64/macosArm64 + the BOM) to Maven Central
  # Portal from a single macOS host, so the deployment is one complete, atomic bundle.
  # macOS K/N can cross-compile the Linux klibs; brew libpq supplies the headers the libpq
  # cinterop needs for every target (sqlite3.h is vendored in the repo).
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install libpq (for the Kotlin/Native libpq cinterop)
        run: brew install libpq

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central Portal
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache --console=plain
